# 测试环境配置 - 覆盖主配置
# 使用H2内存数据库（由H2Database工具类在测试启动时初始化）
# NON_KEYWORDS 让H2不把下列词当成保留字，生产SQL（FROM user等无引号写法）无需修改即可运行
db.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=USER,VALUE,YEAR,DAY,HOUR,MINUTE,SECOND,ROLE,TIMESTAMP,COMMENT,KEY,INDEX,CONSTRAINT,TYPE,PERIOD,POSITION,STATUS,ACTION,SESSION,LEVEL,GROUP,MONTH,DATA,MODE,NAME,DATE,TIME,PASSWORD,PLAN,QUERY,ROW,SCHEMA,CACHE,LOCK,TABLE,TRIGGER,VIEW
db.username=sa
db.password=
db.driver=org.h2.Driver

# DES密钥与生产保持一致（让密码加密行为一致）
des.key=(^&%gasie_%^

# 文件上传到临时目录
upload.baseDir=${user.dir}/target/test-localstorage

# AI Key留空，走空实现不调用网络
ai.api.key=
ai.provider=minimax

# 日志简洁
org.slf4j.simpleLogger.defaultLogLevel=warn
