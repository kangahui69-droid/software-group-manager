# 高校软件小组管理系统 - 配置文件模板
# 本文件为默认模板，提交到Git，不含真实密码
#
# 【本地开发使用说明】
# 1. 复制本文件为 config.local.properties
# 2. 将 config.local.properties 中的占位符（your_xxx_here）替换为真实值
# 3. config.local.properties 已加入 .gitignore，不会被提交
# 4. Config.java 优先加载 config.local.properties，本文件仅作为兜底
#
# 【测试/生产环境】
# 可使用环境变量覆盖（未实现，后续可扩展）或放置 config.test.properties / config.prod.properties

# ============================================
# 数据库配置
# ============================================
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/software_group?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
db.username=root
db.password=your_db_password_here

# ============================================
# HikariCP 连接池配置
# ============================================
hikaricp.maximumPoolSize=10
hikaricp.minimumIdle=5
hikaricp.connectionTimeout=30000
hikaricp.idleTimeout=600000
hikaricp.maxLifetime=1800000
hikaricp.connectionTestQuery=SELECT 1
hikaricp.validationTimeout=5000

# ============================================
# DES加密配置（生产环境请修改为复杂密钥）
# ============================================
des.key=(^&%gasie_%^

# ============================================
# 文件上传配置
# ============================================
upload.maxFileSize=10485760
upload.maxRequestSize=20971520
# 文件存储根目录（绝对路径，支持 ${user.dir} 代表项目根目录、${catalina.base} 代表Tomcat根目录）
# 该目录独立于webapp部署目录，重新部署/clean不会丢失上传文件
upload.baseDir=${user.dir}/localstorage

# ============================================
# 会话配置
# ============================================
session.timeout=30

# ============================================
# AI服务配置
# ============================================
# AI服务提供商：minimax / volcengine / wenxin / qwen / openai
ai.provider=minimax
# API Key（请替换为你的实际API Key）
ai.api.key=your_api_key_here
# API Secret（文心一言等需要）
ai.api.secret=
# API URL
ai.api.url=https://api.minimaxi.com/v1/chat/completions
# 模型名称
ai.model=MiniMax-M2.7
# 超时时间（毫秒）
ai.timeout=60000
# 最大Token数
ai.max_tokens=2000
