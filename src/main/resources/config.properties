# 高校软件小组管理系统 - 配置文件
# 请根据实际情况修改以下配置

# ============================================
# 数据库配置
# ============================================
db.url=jdbc:mysql://localhost:3306/software_group?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
db.username=root
db.password=kang2005.

# ============================================
# HikariCP 连接池配置
# ============================================
# 最大连接数
hikaricp.maximumPoolSize=10
# 最小空闲连接
hikaricp.minimumIdle=5
# 连接超时时间（毫秒）
hikaricp.connectionTimeout=30000
# 空闲超时时间（毫秒）
hikaricp.idleTimeout=600000
# 最大生命周期（毫秒）
hikaricp.maxLifetime=1800000
# 连接测试查询
hikaricp.connectionTestQuery=SELECT 1
# 验证超时时间（毫秒）
hikaricp.validationTimeout=5000

# ============================================
# DES加密配置
# ============================================
# DES加密密钥（请修改为复杂的密钥，至少8位）
des.key=(^&%gasie_%^

# ============================================
# 文件上传配置
# ============================================
# 最大文件大小（字节），默认10MB
upload.maxFileSize=10485760
# 最大请求大小（字节），默认20MB
upload.maxRequestSize=20971520

# ============================================
# 会话配置
# ============================================
# 会话超时时间（分钟）
session.timeout=30
